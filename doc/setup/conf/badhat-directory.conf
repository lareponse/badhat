# /etc/apache2/badhat/badhat-directory.conf

###############################################
# BADHAT: Public Directory Rules
###############################################
# Scope:
#   Included inside:
#
#   <Directory "${ROOT}/public">
#       Include /etc/apache2/badhat/badhat-directory.conf
#   </Directory>
#
# Purpose:
#   - expose only the public webroot
#   - disable directory listing
#   - disable content negotiation side effects
#   - prevent .htaccess overrides
#   - block hidden files, traversal attempts, and null-byte attempts
#   - serve real files directly
#   - send everything else to the BADHAT front controller
###############################################

Options -Indexes -MultiViews +FollowSymLinks
AllowOverride None
Require all granted
AcceptPathInfo Off

RewriteEngine On

# HTTP methods
###############################################
# Default BADHAT public methods.
# PUT, PATCH and DELETE should only be enabled in project/API configs.

RewriteCond %{REQUEST_METHOD} !^(GET|POST|PUT|DELETE|PATCH|HEAD|OPTIONS)$ [NC]
RewriteRule .* - [F]

# Block path traversal and null-byte attempts
###############################################

RewriteCond %{REQUEST_URI} \.\. [OR]
RewriteCond %{REQUEST_URI} (%2e){2} [NC,OR]
RewriteCond %{REQUEST_URI} %00 [NC]
RewriteRule ^ - [F]


# Block hidden files and hidden directories
###############################################

RewriteRule "(^|/)\." - [F]


###############################################
# Serve existing files and directories directly
###############################################

# Serve existing files directly
RewriteCond %{REQUEST_FILENAME} -f [OR]
RewriteCond %{REQUEST_FILENAME} -d
RewriteRule ^ - [L]

# Everything else goes to the front controller
RewriteRule ^ /index.php [QSA,L]