# /etc/apache2/badhat/badhat-local.conf

# Search engine exclusion
###############################################

Header always set X-Robots-Tag "noindex, nofollow, noarchive"

# No browser/proxy cache
###############################################

Header always set Cache-Control "no-store, no-cache, must-revalidate, max-age=0"
Header always set Pragma "no-cache"
Header always set Expires "0"

Header always set Access-Control-Allow-Origin "*"
Header always set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS"
Header always set Access-Control-Allow-Headers "Content-Type, Authorization"

# Local must not persist HTTPS policy in browsers.
###############################################

Header always unset Strict-Transport-Security


# PHP local debugging
###############################################

php_admin_flag session.cookie_httponly Off
php_admin_flag session.cookie_secure   Off

php_admin_flag display_errors         On
php_admin_flag display_startup_errors On
php_admin_flag html_errors            On
php_admin_flag log_errors             On