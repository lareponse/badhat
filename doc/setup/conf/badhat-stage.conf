# /etc/apache2/badhat/badhat-stage.conf

###############################################
# BADHAT STAGE
#
# Scope:
#   Included after badhat-common.conf.
#
# Rule:
#   Stage keeps the same request limits, PHP limits,
#   hardening, and session security as production.
#
# Difference:
#   Stage must not be indexed, archived, or cached.
###############################################


###############################################
# Search engine exclusion
###############################################

Header always set X-Robots-Tag "noindex, nofollow, noarchive"


###############################################
# No browser/proxy cache
###############################################

Header always set Cache-Control "no-store, no-cache, must-revalidate, max-age=0"
Header always set Pragma "no-cache"
Header always set Expires "0"


###############################################
# HSTS
#
# Stage must not persist HTTPS policy in browsers.
###############################################

Header always unset Strict-Transport-Security