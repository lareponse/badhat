# /etc/apache2/badhat/badhat-common.conf

###############################################
# BADHAT COMMON
# Shared production-shaped baseline.
#
# Scope:
#   Included inside each <VirtualHost>.
#
# Rule:
#   This file is strict by default.
#   Environment files read after this one may override only what
#   must differ for stage/local behavior.
###############################################


###############################################
# Request limits
###############################################

LimitRequestLine      2048
LimitRequestFieldSize 2048
LimitRequestFields    50


###############################################
# PHP hardening
###############################################

php_admin_flag  allow_url_include Off
php_admin_flag  allow_url_fopen   Off
php_admin_value disable_functions "exec,system,shell_exec,passthru"


###############################################
# PHP resource limits
###############################################

php_admin_value memory_limit       32M
php_admin_value max_execution_time 5
php_admin_value post_max_size      1M
php_admin_value upload_max_filesize 1M
php_admin_value max_input_vars     100


###############################################
# PHP session security
###############################################

php_admin_flag session.cookie_httponly On
php_admin_flag session.cookie_secure   On
php_admin_flag session.use_strict_mode On


###############################################
# PHP error policy
###############################################

php_admin_flag  display_errors          Off
php_admin_flag  display_startup_errors  Off
php_admin_value error_reporting         E_ALL
php_admin_flag  log_errors              On
php_admin_value error_log               /proc/self/fd/2
php_admin_value log_errors_max_len      0
php_admin_flag  ignore_repeated_errors  Off
php_admin_flag  html_errors             Off


###############################################
# Core security headers
###############################################

Header always set X-Frame-Options "SAMEORIGIN"
Header always set Content-Security-Policy "frame-ancestors 'self'"
Header always set X-Content-Type-Options "nosniff"
Header always set Referrer-Policy "strict-origin-when-cross-origin"

<If "%{SERVER_PROTOCOL} == 'HTTP/1.1'">
    Header always set Connection "Keep-Alive"
    Header always set Keep-Alive "timeout=5, max=100"
</If>

<If "%{SERVER_PROTOCOL} =~ /HTTP\/2/ || %{SERVER_PROTOCOL} =~ /HTTP\/3/">
    Header always set Cross-Origin-Opener-Policy "same-origin"
    Header always set Cross-Origin-Embedder-Policy "require-corp"
</If>
<Else>
    Header always set Cross-Origin-Opener-Policy "same-origin-allow-popups"
    Header always set Cross-Origin-Embedder-Policy "unsafe-none"
</Else>

# HTTPS production policy
# Environment files may remove this after inclusion.
###############################################

Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"

# Cache/proxy correctness
###############################################

Header always merge Vary "Accept-Encoding"


###############################################
# Fingerprinting reduction
###############################################

Header onsuccess unset X-Powered-By
Header always    unset X-Powered-By


###############################################
# Compression
###############################################

<IfModule mod_deflate.c>
    AddOutputFilterByType DEFLATE text/html text/css text/plain text/xml
    AddOutputFilterByType DEFLATE application/javascript application/json
    AddOutputFilterByType DEFLATE application/xml application/xhtml+xml
    AddOutputFilterByType DEFLATE application/rss+xml application/atom+xml
    AddOutputFilterByType DEFLATE image/svg+xml
    AddOutputFilterByType DEFLATE font/ttf font/otf
</IfModule>

<IfModule mod_brotli.c>
    AddOutputFilterByType BROTLI_COMPRESS text/html text/css text/plain text/xml
    AddOutputFilterByType BROTLI_COMPRESS application/javascript application/json
    AddOutputFilterByType BROTLI_COMPRESS application/xml application/xhtml+xml
    AddOutputFilterByType BROTLI_COMPRESS application/rss+xml application/atom+xml
    AddOutputFilterByType BROTLI_COMPRESS image/svg+xml
    AddOutputFilterByType BROTLI_COMPRESS font/ttf font/otf
</IfModule>